<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; width: 100%; height: 100%; background: #0b1220; }
  svg { width: 100vw; height: 100vh; display: block; }
</style>
</head>
<body>
<svg viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gB" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/><stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <marker id="arrB" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6"/>
    </marker>
    <filter id="glowB" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>
  <rect width="512" height="512" fill="#0b1220"/>
  <!-- 内容收敛到中心 80% 安全区, 适配 maskable 裁切 -->
  <g transform="translate(51.2 51.2) scale(0.8)">
    <g opacity="0.55">
      <line x1="150" y1="250" x2="150" y2="374" stroke="#155e75" stroke-width="7"/>
      <rect x="132" y="274" width="36" height="74" rx="7" fill="#164e63"/>
      <line x1="228" y1="230" x2="228" y2="354" stroke="#155e75" stroke-width="7"/>
      <rect x="210" y="250" width="36" height="82" rx="7" fill="#155e75"/>
      <line x1="306" y1="270" x2="306" y2="394" stroke="#155e75" stroke-width="7"/>
      <rect x="288" y="290" width="36" height="74" rx="7" fill="#164e63"/>
    </g>
    <polyline points="120,370 214,296 282,330 396,192" fill="none" stroke="#22d3ee"
      stroke-width="26" stroke-linecap="round" stroke-linejoin="round" opacity="0.35" filter="url(#glowB)"/>
    <polyline points="120,370 214,296 282,330 396,192" fill="none" stroke="url(#gB)"
      stroke-width="22" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrB)"/>
  </g>
</svg>
</body>
</html>
